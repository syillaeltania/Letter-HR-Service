services:
  postgres:
    image: postgres:16-alpine
    container_name: hr_letters_postgres
    environment:
      POSTGRES_DB: hr_letters
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hr_letters"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: hr_letters_api
    env_file:
      - .env
    environment:
      PORT: 3000
      API_URL: http://localhost:3000/api
      CORS_ORIGIN: http://localhost:5173
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/hr_letters?schema=public
    ports:
      - "3000:3000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - generated_docs:/app/storage

volumes:
  postgres_data:
  generated_docs:
